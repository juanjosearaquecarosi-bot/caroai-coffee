{% extends "base.html" %}
{% block title %}{{ action }} Insumo · Caroai Café{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{{ action }} insumo</h1>
        <p>{% if insumo %}Editando {{ insumo.nombre }}{% else %}Nuevo insumo para el inventario{% endif %}</p>
    </div>
</div>

<div class="row" style="max-width: 640px;">
    <div class="card" style="width: 100%;">
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label for="nombre" class="form-label">Nombre del insumo</label>
                    <input type="text" class="form-input" id="nombre" name="nombre"
                           value="{{ insumo.nombre if insumo else '' }}" required placeholder="Ej: Café molido 1kg">
                </div>

                <div class="form-group">
                    <label for="unidad_medida" class="form-label">Unidad de medida</label>
                    <select class="form-select" id="unidad_medida" name="unidad_medida" required>
                        <option value="">— Seleccionar —</option>
                        <option value="kg" {% if insumo and insumo.unidad_medida == 'kg' %}selected{% endif %}>Kilogramo (kg)</option>
                        <option value="g" {% if insumo and insumo.unidad_medida == 'g' %}selected{% endif %}>Gramo (g)</option>
                        <option value="l" {% if insumo and insumo.unidad_medida == 'l' %}selected{% endif %}>Litro (l)</option>
                        <option value="ml" {% if insumo and insumo.unidad_medida == 'ml' %}selected{% endif %}>Mililitro (ml)</option>
                        <option value="unidad" {% if insumo and insumo.unidad_medida == 'unidad' %}selected{% endif %}>Unidad</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="costo_unitario_cop" class="form-label">Costo unitario (COP)</label>
                    <input type="number" class="form-input" id="costo_unitario_cop" name="costo_unitario_cop"
                           value="{{ insumo.costo_unitario_cop if insumo else '' }}" required min="0" placeholder="0">
                </div>

                <div class="form-group">
                    <label for="stock_actual" class="form-label">Stock actual</label>
                    <input type="number" class="form-input" id="stock_actual" name="stock_actual"
                           value="{{ insumo.stock_actual if insumo else '' }}" required min="0" placeholder="0">
                </div>

                <div class="form-group">
                    <label for="stock_minimo" class="form-label">Stock mínimo</label>
                    <input type="number" class="form-input" id="stock_minimo" name="stock_minimo"
                           value="{{ insumo.stock_minimo if insumo else '' }}" required min="0" placeholder="0">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar insumo</button>
                    <a href="{{ url_for('inventory.index') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
