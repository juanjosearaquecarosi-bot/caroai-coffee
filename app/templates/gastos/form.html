{% extends "base.html" %}
{% block title %}{{ action }} gasto · Caroai Café{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{{ action }} gasto</h1>
        <p>{% if gasto %}Editando: <strong>{{ gasto.concepto }}</strong>{% else %}Nuevo gasto operativo{% endif %}</p>
    </div>
</div>

<div class="row form-card">
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="concepto" class="form-label">Concepto</label>
                    <input type="text" class="form-input" id="concepto" name="concepto"
                           value="{{ gasto.concepto if gasto else '' }}" required
                           placeholder="Ej: Pago nómina mes, Leche fresca, Reparación máquina">
                </div>

                <div class="form-group">
                    <label for="categoria" class="form-label">Categoría</label>
                    <select class="form-select" id="categoria" name="categoria" required>
                        <option value="">— Seleccionar —</option>
                        <option value="nomina" {% if gasto and gasto.categoria == 'nomina' %}selected{% endif %}>👥 Nómina</option>
                        <option value="insumos" {% if gasto and gasto.categoria == 'insumos' %}selected{% endif %}>📦 Insumos</option>
                        <option value="mantenimiento" {% if gasto and gasto.categoria == 'mantenimiento' %}selected{% endif %}>🔧 Mantenimiento</option>
                    </select>
                </div>

                <div class="row" style="gap: 1rem;">
                    <div class="flex-1">
                        <div class="form-group">
                            <label for="monto" class="form-label">Monto</label>
                            <input type="number" class="form-input" id="monto" name="monto"
                                   value="{{ gasto.monto if gasto else '' }}" required min="1" placeholder="0">
                        </div>
                    </div>
                    <div style="width: 140px; flex-shrink: 0;">
                        <div class="form-group">
                            <label for="moneda" class="form-label">Moneda</label>
                            <select class="form-select" id="moneda" name="moneda" required>
                                <option value="">—</option>
                                <option value="COP" {% if gasto and gasto.moneda == 'COP' %}selected{% endif %}>COP</option>
                                <option value="USD" {% if gasto and gasto.moneda == 'USD' %}selected{% endif %}>USD</option>
                                <option value="VES" {% if gasto and gasto.moneda == 'VES' %}selected{% endif %}>VES</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" class="form-input" id="fecha" name="fecha"
                           value="{{ today }}" style="max-width: 220px;">
                </div>

                <div class="form-group">
                    <label for="observaciones" class="form-label">Observaciones <span class="text-muted" style="font-weight: 400;">(opcional)</span></label>
                    <textarea class="form-textarea" id="observaciones" name="observaciones"
                              placeholder="Ej: Transferencia Bancolombia, pagado en efectivo…">{{ gasto.observaciones if gasto else '' }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        {% if gasto %}Guardar cambios{% else %}Registrar gasto{% endif %}
                    </button>
                    <a href="{{ url_for('gastos.index') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
